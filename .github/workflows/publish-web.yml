name: Publish web app

# Republish the static web app to gh-pages whenever its source changes on main,
# so UI fixes go live without waiting for the next daily measurement run. The
# derived data aggregates are rebuilt from the history already on gh-pages too,
# so changes to the generation code (e.g. a new output file) also propagate.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "measure/**"
      - "pyproject.toml"
      - ".github/workflows/publish-web.yml"
      - ".github/actions/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Same group as the measurement job so the two never push to gh-pages at once.
  group: gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tool (main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tool
        run: pip install .

      - name: Check out gh-pages
        uses: ./.github/actions/gh-pages-checkout
        with:
          token: ${{ github.token }}

      - name: Regenerate data, sync web app, and publish
        uses: ./.github/actions/gh-pages-publish
        with:
          message: "publish web app ${{ github.sha }}"
